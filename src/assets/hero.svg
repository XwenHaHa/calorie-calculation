<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="100%" height="auto">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2ef"/>
      <stop offset="100%" stop-color="#dce8dd"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="bowl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#166534" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="320" rx="24" fill="url(#bg)"/>

  <!-- 装饰圆形 -->
  <circle cx="680" cy="80" r="120" fill="#bbf7d0" opacity="0.4"/>
  <circle cx="120" cy="260" r="80" fill="#fdba74" opacity="0.2"/>

  <!-- 主图标组 -->
  <g transform="translate(400, 160)" filter="url(#shadow)">
    <!-- 碗 -->
    <path d="M-60 20 C-60 20, -50 60, 0 60 C50 60, 60 20, 60 20" fill="none" stroke="url(#bowl)" stroke-width="6" stroke-linecap="round"/>
    <path d="M-60 20 L60 20" fill="none" stroke="url(#bowl)" stroke-width="6" stroke-linecap="round"/>
    <ellipse cx="0" cy="20" rx="60" ry="12" fill="none" stroke="url(#bowl)" stroke-width="4"/>
    <!-- 碗底小横线 -->
    <path d="M-20 60 C-20 70, 20 70, 20 60" fill="none" stroke="url(#bowl)" stroke-width="4" stroke-linecap="round"/>

    <!-- 叶子 -->
    <g transform="translate(0, -10) rotate(-15)">
      <path d="M0 40 C0 40, -45 20, -45 -15 C-45 -50, 0 -60, 0 -60 C0 -60, 45 -50, 45 -15 C45 20, 0 40, 0 40 Z" fill="url(#leaf)" opacity="0.9"/>
      <path d="M0 40 L0 -50" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
      <path d="M0 -10 L-20 -25 M0 -5 L20 -20 M0 5 L-15 10 M0 10 L15 5" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    </g>
  </g>

  <!-- 标题文字 -->
  <text x="400" y="260" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="600" fill="#1f2937" letter-spacing="2">Calmorie</text>
  <text x="400" y="290" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#6b7280" letter-spacing="1">极简卡路里记录</text>
</svg>
