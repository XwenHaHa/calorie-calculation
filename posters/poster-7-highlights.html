<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calmorie - 产品亮点</title>
  <link rel="stylesheet" href="poster.css">
  <style>
    .highlight-card {
      display: flex;
      gap: 14px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.85);
      border-radius: 14px;
      margin-bottom: 10px;
      border: 1px solid rgba(255, 255, 255, 0.6);
      align-items: flex-start;
    }
    .highlight-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .highlight-text h3 {
      font-size: 0.9rem;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 3px;
    }
    .highlight-text p {
      font-size: 0.8rem;
      color: #6b7280;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="poster">
    <div class="poster-header">
      <div class="poster-number">07</div>
      <h1 class="poster-title">产品亮点</h1>
      <p class="poster-subtitle">用心打磨每一处细节</p>
    </div>

    <div class="poster-content">
      <div class="highlight-card">
        <div class="highlight-icon" style="background: #dcfce7;">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path></svg>
        </div>
        <div class="highlight-text">
          <h3>打开就用，无需注册</h3>
          <p>不需要手机号、邮箱，也不需要创建账号，打开网页就能开始记录</p>
        </div>
      </div>

      <div class="highlight-card">
        <div class="highlight-icon" style="background: #fef3c7;">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0110 0v4"></path></svg>
        </div>
        <div class="highlight-text">
          <h3>数据只在你的手机里</h3>
          <p>所有记录都保存在本地，不上传到任何服务器，你的隐私完全由你掌控</p>
        </div>
      </div>

      <div class="highlight-card">
        <div class="highlight-icon" style="background: #dbeafe;">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        </div>
        <div class="highlight-text">
          <h3>干净无广告</h3>
          <p>没有花里胡哨的广告和弹窗，干净清爽的设计让你专注于记录本身</p>
        </div>
      </div>

      <div class="highlight-card">
        <div class="highlight-icon" style="background: #ede9fe;">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"></path></svg>
        </div>
        <div class="highlight-text">
          <h3>中文英文随时切换</h3>
          <p>一键切换中英文界面，方便不同语言习惯的用户使用</p>
        </div>
      </div>

      <div class="highlight-card">
        <div class="highlight-icon" style="background: #fce7f3;">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#db2777" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
        </div>
        <div class="highlight-text">
          <h3>防误触设计</h3>
          <p>删除记录前会弹出确认提示，再也不用担心手滑误删</p>
        </div>
      </div>

      <div class="highlight-card">
        <div class="highlight-icon" style="background: #ccfbf1;">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0d9488" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
        </div>
        <div class="highlight-text">
          <h3>手机电脑都能用</h3>
          <p>响应式设计，手机浏览器、电脑网页都能完美显示</p>
        </div>
      </div>
    </div>

    <div class="poster-footer">
      <div class="footer-logo">
        <div class="icon">C</div>
        <span>Calmorie</span>
      </div>
      <span class="footer-tag">用心做好每一个细节</span>
    </div>
  </div>
</body>
</html>
