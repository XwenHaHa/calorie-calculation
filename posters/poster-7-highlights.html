<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calmorie - 产品亮点</title>
  <link rel="stylesheet" href="poster.css">
  <style>
    .grid-3x2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }
    .grid-card {
      background: rgba(255, 255, 255, 0.75);
      border-radius: 12px;
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, 0.6);
    }
    .grid-card-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
    }
    .grid-card-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 3px;
    }
    .grid-card-desc {
      font-size: 0.7rem;
      color: #6b7280;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="poster">
    <div class="poster-left">
      <div class="poster-number">07</div>
      <h1 class="poster-title">产品亮点</h1>
      <p class="poster-subtitle">用心打磨每一处细节</p>
      <div class="grid-3x2">
        <div class="grid-card">
          <div class="grid-card-icon" style="background: #dcfce7;">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path></svg>
          </div>
          <div class="grid-card-title">打开就用</div>
          <div class="grid-card-desc">不需要手机号、邮箱、账号</div>
        </div>
        <div class="grid-card">
          <div class="grid-card-icon" style="background: #fef3c7;">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0110 0v4"></path></svg>
          </div>
          <div class="grid-card-title">隐私安全</div>
          <div class="grid-card-desc">数据本地存储，不上传服务器</div>
        </div>
        <div class="grid-card">
          <div class="grid-card-icon" style="background: #dbeafe;">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
          </div>
          <div class="grid-card-title">干净无广告</div>
          <div class="grid-card-desc">没有花里胡哨的广告和弹窗</div>
        </div>
        <div class="grid-card">
          <div class="grid-card-icon" style="background: #ede9fe;">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"></path></svg>
          </div>
          <div class="grid-card-title">双语支持</div>
          <div class="grid-card-desc">中文英文一键切换</div>
        </div>
        <div class="grid-card">
          <div class="grid-card-icon" style="background: #fce7f3;">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#db2777" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
          </div>
          <div class="grid-card-title">防误触</div>
          <div class="grid-card-desc">删除前会弹出确认提示</div>
        </div>
        <div class="grid-card">
          <div class="grid-card-icon" style="background: #ccfbf1;">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0d9488" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
          </div>
          <div class="grid-card-title">跨平台</div>
          <div class="grid-card-desc">手机电脑都能完美显示</div>
        </div>
      </div>
    </div>
    <div class="poster-right">
      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px;">
        <div style="width: 80px; height: 80px; background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); border-radius: 24px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; box-shadow: 0 12px 30px rgba(34, 197, 94, 0.25);">
          <span style="font-size: 2rem; font-weight: 800; color: white;">C</span>
        </div>
        <div style="font-size: 1.3rem; font-weight: 700; color: #111827; margin-bottom: 8px;">Calmorie</div>
        <div style="font-size: 0.9rem; color: #6b7280; line-height: 1.6;">
          打开即用<br>隐私安全<br>干净清爽
        </div>
      </div>
    </div>
  </div>
</body>
</html>
