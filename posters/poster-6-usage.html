<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calmorie - 使用教程</title>
  <link rel="stylesheet" href="poster.css">
</head>
<body>
  <div class="poster">
    <div class="poster-left">
      <div class="poster-number">06</div>
      <h1 class="poster-title">3 分钟上手</h1>
      <p class="poster-subtitle">跟着做，马上开始记录</p>
      <div class="step-list">
        <div class="step">
          <div class="step-num">1</div>
          <div class="step-content">
            <h4>打开应用</h4>
            <p>手机浏览器访问链接</p>
          </div>
        </div>
        <div class="step">
          <div class="step-num">2</div>
          <div class="step-content">
            <h4>点击绿色 + 按钮</h4>
            <p>屏幕下方的圆形按钮</p>
          </div>
        </div>
        <div class="step">
          <div class="step-num">3</div>
          <div class="step-content">
            <h4>选择吃了什么</h4>
            <p>从列表里选，或自己输入</p>
          </div>
        </div>
        <div class="step">
          <div class="step-num">4</div>
          <div class="step-content">
            <h4>查看今日热量</h4>
            <p>首页自动汇总</p>
          </div>
        </div>
        <div class="step">
          <div class="step-num">5</div>
          <div class="step-content">
            <h4>获取 AI 建议</h4>
            <p>点击底部「AI」标签</p>
          </div>
        </div>
      </div>
    </div>
    <div class="poster-right">
      <div class="screenshot-container">
        <div class="screenshot-frame">
          <img src="screenshots/home.png" alt="操作示意"
               onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
          <div class="screenshot-placeholder" style="display: none;">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.5 19.5h3m-6.75 2.25h10.5a2.25 2.25 0 002.25-2.25v-15a2.25 2.25 0 00-2.25-2.25H6.75A2.25 2.25 0 004.5 4.5v15a2.25 2.25 0 002.25 2.25z" />
            </svg>
            <div class="hint">不用下载 APP，浏览器打开即用</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
