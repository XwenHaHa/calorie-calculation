<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calmorie - 轻松记录</title>
  <link rel="stylesheet" href="poster.css">
</head>
<body>
  <div class="poster">
    <div class="poster-left">
      <div class="poster-number">02</div>
      <h1 class="poster-title">轻松记录</h1>
      <p class="poster-subtitle">点几下就能记录一顿饭或一次运动</p>
      <div class="feature-list">
        <div class="feature-item">
          <div class="feature-dot"></div>
          <div class="feature-text">100+ 常见食物热量数据</div>
        </div>
        <div class="feature-item">
          <div class="feature-dot"></div>
          <div class="feature-text">多种运动类型可选</div>
        </div>
        <div class="feature-item">
          <div class="feature-dot"></div>
          <div class="feature-text">支持自定义名称和热量</div>
        </div>
      </div>
      <div class="poster-left-footer">
        <p class="slogan"><strong>轻松记录，科学管理</strong></p>
      </div>
    </div>
    <div class="poster-right">
      <div class="screenshot-container">
        <div class="screenshot-frame">
          <img src="screenshots/add.png" alt="添加记录截图"
               onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
          <div class="screenshot-placeholder" style="display: none;">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4.5v15m7.5-7.5h-15" />
            </svg>
            <div class="hint">请截图替换：posters/screenshots/add.png</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
