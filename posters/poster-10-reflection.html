<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calmorie - 想说的话</title>
  <link rel="stylesheet" href="poster.css">
</head>
<body>
  <div class="poster">
    <div class="poster-left">
      <div class="poster-number">10</div>
      <h1 class="poster-title">想说的话</h1>
      <p class="poster-subtitle">关于这个产品的一些想法</p>
      <div class="thought-card">
        <div class="thought-title">
          <div class="thought-icon" style="background: #fef3c7;">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
          </div>
          为什么做这个产品
        </div>
        <div class="thought-text">
          市面上的 APP 大多要注册、有广告。我想做一个<strong>打开就能用、干净无广告</strong>的工具。
        </div>
      </div>
      <div class="thought-card">
        <div class="thought-title">
          <div class="thought-icon" style="background: #dcfce7;">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0110 0v4"></path></svg>
          </div>
          为什么数据存在本地
        </div>
        <div class="thought-text">
          健康数据很私密。<strong>你的数据只属于你</strong>，存在你的手机里。
        </div>
      </div>
      <div class="thought-card">
        <div class="thought-title">
          <div class="thought-icon" style="background: #dbeafe;">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
          </div>
          为什么设计这么简洁
        </div>
        <div class="thought-text">
          记录热量是为了更健康，<strong>不应该让记录本身变成一种压力</strong>。
        </div>
      </div>
      <div class="thought-card">
        <div class="thought-title">
          <div class="thought-icon" style="background: #ede9fe;">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>
          </div>
          关于功能完善
        </div>
        <div class="thought-text">
          现在功能还不够完美，但<strong>好的产品是迭代出来的</strong>，会持续改进。
        </div>
      </div>
    </div>
    <div class="poster-right">
      <div class="closing-card">
        <div class="closing-quote">
          希望这个小工具<br>能帮到正在关注健康的你
        </div>
        <div class="closing-sub" style="margin-top: 16px;">
          代码是工具，解决问题才是目的
        </div>
        <div class="closing-sub" style="margin-top: 12px; color: #22c55e; font-weight: 600;">
          感谢你的使用和支持
        </div>
      </div>
    </div>
  </div>
</body>
</html>
