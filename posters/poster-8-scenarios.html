<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calmorie - 使用场景</title>
  <link rel="stylesheet" href="poster.css">
  <style>
    .scene-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .scene-card {
      background: rgba(255, 255, 255, 0.75);
      border-radius: 14px;
      padding: 18px 14px;
      border: 1px solid rgba(255, 255, 255, 0.6);
      text-align: center;
    }
    .scene-card-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 10px;
    }
    .scene-card-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 4px;
    }
    .scene-card-desc {
      font-size: 0.75rem;
      color: #6b7280;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="poster">
    <div class="poster-left">
      <div class="poster-number">08</div>
      <h1 class="poster-title">谁适合用</h1>
      <p class="poster-subtitle">适合每一个想要管理热量的你</p>
      <div class="scene-grid">
        <div class="scene-card">
          <div class="scene-card-icon" style="background: #fef3c7;">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2"><path d="M18 20V10"></path><path d="M12 20V4"></path><path d="M6 20v-6"></path></svg>
          </div>
          <div class="scene-card-title">正在减肥</div>
          <div class="scene-card-desc">每天吃了多少心里有数</div>
        </div>
        <div class="scene-card">
          <div class="scene-card-icon" style="background: #dcfce7;">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2"><path d="M6.5 6.5L17.5 17.5"></path><path d="M6.5 17.5L17.5 6.5"></path><circle cx="12" cy="12" r="10"></circle></svg>
          </div>
          <div class="scene-card-title">健身增肌</div>
          <div class="scene-card-desc">确保吃够热量和营养</div>
        </div>
        <div class="scene-card">
          <div class="scene-card-icon" style="background: #dbeafe;">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"></path></svg>
          </div>
          <div class="scene-card-title">养成习惯</div>
          <div class="scene-card-desc">记录本身就是自律</div>
        </div>
        <div class="scene-card">
          <div class="scene-card-icon" style="background: #fce7f3;">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#db2777" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"></path></svg>
          </div>
          <div class="scene-card-title">医生建议</div>
          <div class="scene-card-desc">配合医嘱监控饮食</div>
        </div>
      </div>
    </div>
    <div class="poster-right">
      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px;">
        <div style="width: 100px; height: 100px; background: linear-gradient(135deg, #dcfce7 0%, #bbf7d0 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 20px;">
          <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="1.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 00-3-3.87"></path><path d="M16 3.13a4 4 0 010 7.75"></path></svg>
        </div>
        <div style="font-size: 1rem; font-weight: 600; color: #1f2937; margin-bottom: 8px;">人人可用</div>
        <div style="font-size: 0.85rem; color: #6b7280; line-height: 1.6;">
          不限年龄<br>不限场景<br>随时开始
        </div>
      </div>
    </div>
  </div>
</body>
</html>
