<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calmorie - 今日概览</title>
  <link rel="stylesheet" href="poster.css">
</head>
<body>
  <div class="poster">
    <div class="poster-header">
      <div class="poster-number">01</div>
      <h1 class="poster-title">今日概览</h1>
      <p class="poster-subtitle">打开应用，一眼看清今天的热量情况</p>
    </div>

    <div class="poster-content">
      <!-- 截图区域 -->
      <div class="screenshot-container">
        <div class="screenshot-frame">
          <img src="screenshots/home.png" alt="首页截图"
               onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
          <div class="screenshot-placeholder" style="display: none;">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M3.75 21h16.5A2.25 2.25 0 0022.5 18.75V5.25A2.25 2.25 0 0020.25 3H3.75A2.25 2.25 0 001.5 5.25v13.5A2.25 2.25 0 003.75 21z" />
            </svg>
            <div>请截图替换</div>
            <div class="hint">运行应用 → 首页截图 → 保存为 posters/screenshots/home.png</div>
          </div>
        </div>
      </div>

      <!-- 功能说明 -->
      <div class="feature-desc">
        <div class="feature-desc-title">
          <div class="feature-desc-icon green">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
          </div>
          今日热量一目了然
        </div>
        <div class="feature-desc-text">
          打开应用就能看到今天的净热量，以及摄入和消耗的详细数据，帮你快速了解今天的饮食情况。
        </div>
      </div>

      <div class="highlight-list">
        <div class="highlight-item">
          <div class="highlight-dot"></div>
          <div class="highlight-text">实时计算今日净热量（摄入 - 消耗）</div>
        </div>
        <div class="highlight-item">
          <div class="highlight-dot"></div>
          <div class="highlight-text">最近记录列表，方便回顾和删除</div>
        </div>
        <div class="highlight-item">
          <div class="highlight-dot"></div>
          <div class="highlight-text">AI 智能分析今日饮食状态</div>
        </div>
      </div>
    </div>

    <div class="poster-footer">
      <div class="footer-logo">
        <div class="icon">C</div>
        <span>Calmorie</span>
      </div>
      <span class="footer-tag">卡路里管理助手</span>
    </div>
  </div>
</body>
</html>
