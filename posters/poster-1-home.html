<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calmorie - 今日概览</title>
  <link rel="stylesheet" href="poster.css">
</head>
<body>
  <div class="poster">
    <div class="poster-left">
      <div class="poster-number">01</div>
      <h1 class="poster-title">今日概览</h1>
      <p class="poster-subtitle">打开应用，一眼看清今天的热量情况</p>
      <div class="feature-list">
        <div class="feature-item">
          <div class="feature-dot"></div>
          <div class="feature-text">实时计算今日净热量（摄入 - 消耗）</div>
        </div>
        <div class="feature-item">
          <div class="feature-dot"></div>
          <div class="feature-text">最近记录列表，方便回顾和删除</div>
        </div>
        <div class="feature-item">
          <div class="feature-dot"></div>
          <div class="feature-text">AI 智能分析今日饮食状态</div>
        </div>
      </div>
      <div class="poster-left-footer">
        <p class="slogan"><strong>轻松记录，科学管理</strong></p>
      </div>
    </div>
    <div class="poster-right">
      <div class="screenshot-container">
        <div class="screenshot-frame">
          <img src="screenshots/home.png" alt="首页截图"
               onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
          <div class="screenshot-placeholder" style="display: none;">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M3.75 21h16.5A2.25 2.25 0 0022.5 18.75V5.25A2.25 2.25 0 0020.25 3H3.75A2.25 2.25 0 001.5 5.25v13.5A2.25 2.25 0 003.75 21z" />
            </svg>
            <div class="hint">请截图替换：posters/screenshots/home.png</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
