<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calmorie - 日历视图</title>
  <link rel="stylesheet" href="poster.css">
</head>
<body>
  <div class="poster">
    <div class="poster-left">
      <div class="poster-number">05</div>
      <h1 class="poster-title">日历视图</h1>
      <p class="poster-subtitle">按日期查看记录，回顾更方便</p>
      <div class="feature-list">
        <div class="feature-item">
          <div class="feature-dot"></div>
          <div class="feature-text">月度日历视图，一目了然</div>
        </div>
        <div class="feature-item">
          <div class="feature-dot"></div>
          <div class="feature-text">点击日期查看当日记录</div>
        </div>
        <div class="feature-item">
          <div class="feature-dot"></div>
          <div class="feature-text">月度热量汇总统计</div>
        </div>
      </div>
      <div class="poster-left-footer">
        <p class="slogan"><strong>轻松记录，科学管理</strong></p>
      </div>
    </div>
    <div class="poster-right">
      <div class="screenshot-container">
        <div class="screenshot-frame">
          <img src="screenshots/calendar.png" alt="日历截图"
               onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
          <div class="screenshot-placeholder" style="display: none;">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" />
            </svg>
            <div class="hint">请截图替换：posters/screenshots/calendar.png</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
