<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calmorie - 日历视图</title>
  <link rel="stylesheet" href="poster.css">
</head>
<body>
  <div class="poster">
    <div class="poster-header">
      <div class="poster-number">05</div>
      <h1 class="poster-title">日历视图</h1>
      <p class="poster-subtitle">按日期查看记录，回顾更方便</p>
    </div>

    <div class="poster-content">
      <!-- 截图区域 -->
      <div class="screenshot-container">
        <div class="screenshot-frame">
          <img src="screenshots/calendar.png" alt="日历截图"
               onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
          <div class="screenshot-placeholder" style="display: none;">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" />
            </svg>
            <div>请截图替换</div>
            <div class="hint">运行应用 → 日历页截图 → 保存为 posters/screenshots/calendar.png</div>
          </div>
        </div>
      </div>

      <!-- 功能说明 -->
      <div class="feature-desc">
        <div class="feature-desc-title">
          <div class="feature-desc-icon green">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
          </div>
          按日期管理记录
        </div>
        <div class="feature-desc-text">
          日历形式展示，点击任意日期即可查看当天的饮食运动记录，回顾历史更直观。
        </div>
      </div>

      <div class="highlight-list">
        <div class="highlight-item">
          <div class="highlight-dot"></div>
          <div class="highlight-text">月度日历视图，一目了然</div>
        </div>
        <div class="highlight-item">
          <div class="highlight-dot"></div>
          <div class="highlight-text">点击日期查看当日记录</div>
        </div>
        <div class="highlight-item">
          <div class="highlight-dot"></div>
          <div class="highlight-text">月度热量汇总统计</div>
        </div>
      </div>
    </div>

    <div class="poster-footer">
      <div class="footer-logo">
        <div class="icon">C</div>
        <span>Calmorie</span>
      </div>
      <span class="footer-tag">卡路里管理助手</span>
    </div>
  </div>
</body>
</html>
