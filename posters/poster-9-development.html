<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calmorie - 落地过程</title>
  <link rel="stylesheet" href="poster.css">
  <style>
    .dev-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }
    .dev-card {
      background: rgba(255, 255, 255, 0.75);
      border-radius: 14px;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.6);
      text-align: center;
    }
    .dev-card-num {
      width: 32px;
      height: 32px;
      background: #22c55e;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 600;
      margin: 0 auto 10px;
    }
    .dev-card-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 4px;
    }
    .dev-card-desc {
      font-size: 0.75rem;
      color: #6b7280;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="poster">
    <div class="poster-left">
      <div class="poster-number">09</div>
      <h1 class="poster-title">落地过程</h1>
      <p class="poster-subtitle">从想法到成品，一步步走来</p>
      <div class="dev-grid">
        <div class="dev-card">
          <div class="dev-card-num">1</div>
          <div class="dev-card-title">确定需求</div>
          <div class="dev-card-desc">简单好用的热量工具</div>
        </div>
        <div class="dev-card">
          <div class="dev-card-num">2</div>
          <div class="dev-card-title">设计界面</div>
          <div class="dev-card-desc">清新简洁的风格</div>
        </div>
        <div class="dev-card">
          <div class="dev-card-num">3</div>
          <div class="dev-card-title">开发实现</div>
          <div class="dev-card-desc">确保流畅快速</div>
        </div>
        <div class="dev-card">
          <div class="dev-card-num">4</div>
          <div class="dev-card-title">测试优化</div>
          <div class="dev-card-desc">多设备兼容测试</div>
        </div>
        <div class="dev-card">
          <div class="dev-card-num">5</div>
          <div class="dev-card-title">持续迭代</div>
          <div class="dev-card-desc">根据反馈改进</div>
        </div>
      </div>
    </div>
    <div class="poster-right">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 10px;">
        <div class="dev-card">
          <div style="font-size: 1.5rem; font-weight: 800; color: #22c55e;">100+</div>
          <div style="font-size: 0.75rem; color: #6b7280; margin-top: 4px;">食物数据</div>
        </div>
        <div class="dev-card">
          <div style="font-size: 1.5rem; font-weight: 800; color: #22c55e;">< 1s</div>
          <div style="font-size: 0.75rem; color: #6b7280; margin-top: 4px;">打开速度</div>
        </div>
        <div class="dev-card">
          <div style="font-size: 1.5rem; font-weight: 800; color: #22c55e;">0</div>
          <div style="font-size: 0.75rem; color: #6b7280; margin-top: 4px;">广告数量</div>
        </div>
        <div class="dev-card">
          <div style="font-size: 1.5rem; font-weight: 800; color: #22c55e;">0</div>
          <div style="font-size: 0.75rem; color: #6b7280; margin-top: 4px;">注册步骤</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
