<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calmorie - 封面</title>
  <link rel="stylesheet" href="poster.css">
</head>
<body>
  <div class="poster cover-poster">
    <div class="cover-left">
      <div class="cover-logo">
        <div class="cover-logo-text">C</div>
      </div>
      <h1 class="cover-title">Calmorie</h1>
      <p class="cover-subtitle">卡路里管理助手</p>
      <p class="cover-desc">
        一个简单好用的热量记录工具。<br>
        不用注册，没有广告，打开就能用。<br>
        帮你轻松管理每天吃了多少、消耗多少。
      </p>
      <div class="cover-points">
        <div class="cover-point">
          <div class="cover-point-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path></svg>
          </div>
          <div class="cover-point-text">打开即用</div>
        </div>
        <div class="cover-point">
          <div class="cover-point-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0110 0v4"></path></svg>
          </div>
          <div class="cover-point-text">隐私安全</div>
        </div>
        <div class="cover-point">
          <div class="cover-point-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
          </div>
          <div class="cover-point-text">无广告</div>
        </div>
        <div class="cover-point">
          <div class="cover-point-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
          </div>
          <div class="cover-point-text">AI 建议</div>
        </div>
      </div>
    </div>
    <div class="cover-right">
      <div class="cover-mock">
        <div class="cover-mock-screen">
          <div class="cover-mock-title">净热量</div>
          <div class="cover-mock-value">1,250</div>
          <div class="cover-mock-label">千卡</div>
          <div class="cover-mock-row">
            <div class="cover-mock-stat">
              <div class="cover-mock-stat-label">摄入</div>
              <div class="cover-mock-stat-value">1,850</div>
            </div>
            <div class="cover-mock-stat">
              <div class="cover-mock-stat-label">消耗</div>
              <div class="cover-mock-stat-value green">-600</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
