<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calmorie - AI 建议</title>
  <link rel="stylesheet" href="poster.css">
</head>
<body>
  <div class="poster">
    <div class="poster-header">
      <div class="poster-number">04</div>
      <h1 class="poster-title">AI 健康建议</h1>
      <p class="poster-subtitle">一键获取专属的饮食运动建议</p>
    </div>

    <div class="poster-content">
      <!-- 截图区域 -->
      <div class="screenshot-container">
        <div class="screenshot-frame">
          <img src="screenshots/ai.png" alt="AI建议截图"
               onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
          <div class="screenshot-placeholder" style="display: none;">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.455 2.456L21.75 6l-1.036.259a3.375 3.375 0 00-2.455 2.456zM16.894 20.567L16.5 21.75l-.394-1.183a2.25 2.25 0 00-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 001.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 001.423 1.423l1.183.394-1.183.394a2.25 2.25 0 00-1.423 1.423z" />
            </svg>
            <div>请截图替换</div>
            <div class="hint">运行应用 → AI 页截图 → 保存为 posters/screenshots/ai.png</div>
          </div>
        </div>
      </div>

      <!-- 功能说明 -->
      <div class="feature-desc">
        <div class="feature-desc-title">
          <div class="feature-desc-icon purple">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
          </div>
          智能分析你的数据
        </div>
        <div class="feature-desc-text">
          根据你的饮食和运动记录，AI 会给出针对性的健康建议，帮你更好地管理热量。
        </div>
      </div>

      <div class="highlight-list">
        <div class="highlight-item">
          <div class="highlight-dot"></div>
          <div class="highlight-text">基于你的实际数据分析</div>
        </div>
        <div class="highlight-item">
          <div class="highlight-dot"></div>
          <div class="highlight-text">饮食、运动、生活习惯多维度建议</div>
        </div>
        <div class="highlight-item">
          <div class="highlight-dot"></div>
          <div class="highlight-text">一键生成，随时刷新</div>
        </div>
      </div>
    </div>

    <div class="poster-footer">
      <div class="footer-logo">
        <div class="icon">C</div>
        <span>Calmorie</span>
      </div>
      <span class="footer-tag">卡路里管理助手</span>
    </div>
  </div>
</body>
</html>
